apiVersion: apps/v1
kind: Deployment
metadata:
  name: pfe-python-app-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: pfe-python-app
        image: moabdelazem/pfe-python-app:latest
        resources:
          requests:
            memory: "128Mi"
            cpu: "500m"
          limits:
            memory: "256Mi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/v1/healthz
            port: 5000
          periodSeconds: 20
          initialDelaySeconds: 15
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: pfe-python-app-svc
spec:
  selector:
    app: api
  ports:
    - port: 8080
      targetPort: 5000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pfe-python-app-ingress
  labels:
    app.kubernetes.io/name: pfe-python-app
    app: api
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: pfe-python-app-svc
            port: 
              number: 8080
